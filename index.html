<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --border: #e8e0d4;
      --text: #2c2416;
      --text-muted: #7a6e5e;
      --accent: #7a4f2e;
      --accent-light: #f0e6dc;
      --green: #3d6e4f;
      --green-light: #e8f2ec;
      --yellow: #9a720a;
      --yellow-light: #fef8e0;
      --red: #8b2e2e;
      --red-light: #fdf0f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--accent);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .sync-status { font-size: 11px; opacity: 0.85; max-width: 120px; text-align: right; }
    .btn-header {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }
    .btn-header:hover { background: rgba(255,255,255,0.32); }
    .btn-header:active { background: rgba(255,255,255,0.15); }

    /* Alert banner */
    .alert-banner {
      background: #fffbec;
      border-bottom: 2px solid var(--yellow);
      padding: 10px 16px;
    }
    .alert-banner-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .alert-banner-title {
      font-size: 11px; font-weight: 700; color: var(--yellow);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .alert-dismiss {
      font-size: 12px; color: var(--text-muted); cursor: pointer;
      border: none; background: none; padding: 0; font-family: inherit;
    }
    .alert-item {
      font-size: 13px; padding: 4px 0; color: var(--text);
      border-bottom: 1px solid rgba(154,114,10,0.12);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .alert-item:last-child { border-bottom: none; padding-bottom: 0; }
    .alert-item-left { flex: 1; }
    .alert-item-book { font-size: 11px; color: var(--text-muted); }
    .alert-item-ch { font-size: 13px; font-weight: 500; }
    .alert-item-date { font-size: 11px; color: var(--yellow); font-weight: 600; margin-top: 1px; }
    .alert-item-missing { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Nav */
    .nav-tabs {
      display: flex; background: var(--surface);
      border-bottom: 1px solid var(--border); padding: 0 12px; overflow-x: auto;
    }
    .nav-tab {
      padding: 11px 14px; border: none; background: none; color: var(--text-muted);
      font-size: 14px; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
    }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Content */
    .content { padding: 16px; max-width: 720px; margin: 0 auto; }

    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 12px; overflow: hidden;
    }
    .card-header {
      padding: 13px 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; user-select: none;
    }
    .card-header:hover { background: #f5f2ee; }
    .card-body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
    .card-body-pad { padding: 14px 16px; }

    .book-title { font-size: 15px; font-weight: 600; }
    .book-author { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .book-right { text-align: right; flex-shrink: 0; }
    .book-progress { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .chevron { font-size: 11px; color: var(--text-muted); display: inline-block; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; width: 80px; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

    /* Chapter rows */
    .chapter-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
      border-radius: 4px; transition: background 0.1s;
    }
    .chapter-item:last-child { border-bottom: none; }
    .chapter-item:hover { background: #f5f2ee; margin: 0 -8px; padding: 9px 8px; }
    .ch-num { font-size: 11px; font-weight: 700; color: var(--text-muted); min-width: 26px; }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-date { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .ch-dots { display: flex; gap: 4px; align-items: center; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .dot.written { background: var(--yellow); }
    .dot.posted { background: var(--green); }

    /* Status/content blocks */
    .status-section { margin: 10px 0 0; }
    .status-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .content-block { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .content-block-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; background: var(--bg); cursor: pointer; user-select: none; gap: 10px;
    }
    .content-block-header:hover { background: #ede9e3; }
    .content-block-label { font-size: 13px; font-weight: 600; }
    .content-block-body { padding: 10px 12px; border-top: 1px solid var(--border); }
    .status-row { display: flex; align-items: center; padding: 0 0 9px; gap: 8px; }
    .status-label { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 50px; }
    .status-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .sbtn {
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted); font-size: 12px;
      cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.1s;
    }
    .sbtn:hover { border-color: var(--text-muted); }
    .sbtn.active-not_started { background: #ede9e3; color: var(--text); border-color: #c8bfb4; }
    .sbtn.active-written { background: var(--yellow-light); color: var(--yellow); border-color: var(--yellow); }
    .sbtn.active-posted { background: var(--green-light); color: var(--green); border-color: var(--green); }

    /* Forms */
    .form-group { margin-bottom: 13px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
    }
    .form-input {
      width: 100%; padding: 8px 11px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 14px; background: var(--bg); color: var(--text);
      font-family: inherit; transition: border-color 0.15s;
    }
    .form-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
    textarea.form-input { resize: vertical; min-height: 72px; }

    /* Buttons */
    .btn {
      padding: 8px 18px; border-radius: 7px; border: none; font-size: 14px;
      font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { background: var(--bg); border-color: var(--text-muted); }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #e8b4b4; }
    .btn-danger:hover { background: #fae0e0; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
    .ml-auto { margin-left: auto; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.38);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    @media (min-width: 560px) { .overlay { align-items: center; padding: 20px; } }
    .modal {
      background: var(--surface); border-radius: 14px 14px 0 0;
      width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto;
      padding: 20px 20px 28px;
    }
    @media (min-width: 560px) { .modal { border-radius: 12px; } }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

    /* Setup */
    .setup-wrap { padding: 24px 16px; max-width: 460px; margin: 0 auto; }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-top: 32px; }
    .setup-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .setup-card .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.55; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

    /* Dashboard */
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .section-gap { margin-top: 20px; }
    .upcoming-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
    }
    .upcoming-card:hover { border-color: var(--accent); }
    .uc-book { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .uc-title { font-size: 14px; font-weight: 600; }
    .uc-date { font-size: 12px; color: var(--accent); margin-top: 3px; font-weight: 500; }
    .uc-chips { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; border: 1px solid; }
    .chip.not_started { background: #ede9e3; color: var(--text-muted); border-color: #d4ccc2; }
    .chip.written { background: var(--yellow-light); color: var(--yellow); border-color: var(--yellow); }
    .chip.posted { background: var(--green-light); color: var(--green); border-color: var(--green); }

    /* Calendar */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .cal-month-title { font-size: 17px; font-weight: 700; }
    .cal-nav {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 13px; cursor: pointer; font-size: 15px; color: var(--text-muted);
    }
    .cal-nav:hover { background: var(--border); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted); text-align: center;
      padding: 4px 0; text-transform: uppercase;
    }
    .cal-cell {
      min-height: 58px; border: 1px solid var(--border); border-radius: 5px;
      padding: 4px 5px; background: var(--surface); vertical-align: top;
    }
    .cal-cell.other-month { background: var(--bg); }
    .cal-cell.other-month .cal-date { opacity: 0.35; }
    .cal-cell.today { border-color: var(--accent); border-width: 2px; }
    .cal-date { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 3px; }
    .cal-cell.today .cal-date { color: var(--accent); }
    .cal-event {
      font-size: 10px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px;
      cursor: pointer; line-height: 1.3; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; display: block;
    }
    .cal-event:hover { opacity: 0.75; }

    /* Book index */
    .index-text {
      font-family: 'Courier New', Courier, monospace; font-size: 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 14px; white-space: pre-wrap; max-height: 380px; overflow-y: auto;
      line-height: 1.6; color: var(--text);
    }
    .copy-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .copy-msg { font-size: 12px; color: var(--green); }

    /* Misc */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }
    .hidden { display: none !important; }

    /* Legend */
    .cal-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================================
// STATE
// ============================================================
let state = { books: [] };

let gh = { token: '', owner: '', repo: '', sha: null };

const now = new Date();
let ui = {
  tab: 'dashboard',
  expanded: new Set(),
  modal: null,
  syncMsg: '',
  dirty: false,
  alertsDismissed: false,
  calYear:  now.getFullYear(),
  calMonth: now.getMonth(), // 0-indexed
};

// ============================================================
// BOOK COLORS  (one per book, wraps if >7)
// ============================================================
const BOOK_COLORS       = ['#7a4f2e','#3d6e4f','#5a3d7a','#7a6a2e','#2e5a7a','#7a2e4f','#2e7a6a'];
const BOOK_COLORS_LIGHT = ['#f0e6dc','#e8f2ec','#ede0f5','#f2f0dc','#dce8f2','#f2dce8','#dcf2ee'];

function bookColorIdx(bookId) {
  const idx = state.books.findIndex(b => b.id === bookId);
  return idx < 0 ? 0 : idx % BOOK_COLORS.length;
}
function bookColor(bookId)      { return BOOK_COLORS[bookColorIdx(bookId)]; }
function bookColorLight(bookId) { return BOOK_COLORS_LIGHT[bookColorIdx(bookId)]; }

// ============================================================
// GITHUB API
// ============================================================
async function ghReq(path, opts = {}) {
  return fetch('https://api.github.com' + path, {
    ...opts,
    headers: {
      'Authorization': 'token ' + gh.token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
}

async function loadData() {
  if (!gh.token) return;
  setSync('Loading...');
  try {
    const res = await ghReq('/repos/' + gh.owner + '/' + gh.repo + '/contents/data.json');
    if (res.status === 404) {
      gh.sha = null; setSync('Ready (empty)');
    } else if (res.ok) {
      const j = await res.json();
      gh.sha = j.sha;
      state = JSON.parse(atob(j.content.replace(/\n/g, '')));
      setSync('Loaded ✓');
    } else { setSync('Load error ' + res.status); }
  } catch(e) { setSync('Error: ' + e.message); }
  render();
}

async function saveData() {
  if (!gh.token) { alert('Not connected to GitHub yet. Check Settings.'); return; }
  setSync('Saving...');
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
  const body = { message: 'Update chapter tracker data', content };
  if (gh.sha) body.sha = gh.sha;
  try {
    const res = await ghReq('/repos/' + gh.owner + '/' + gh.repo + '/contents/data.json', {
      method: 'PUT', body: JSON.stringify(body),
    });
    if (res.ok) {
      const j = await res.json();
      gh.sha = j.content.sha;
      ui.dirty = false;
      setSync('Saved ✓');
    } else {
      const e = await res.json();
      setSync('Save error: ' + (e.message || res.status));
    }
  } catch(e) { setSync('Error: ' + e.message); }
  render();
}

function setSync(msg) {
  ui.syncMsg = msg;
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

// ============================================================
// HELPERS
// ============================================================
function uid() { return Math.random().toString(36).substr(2, 9); }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtDateShort(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function daysUntil(d) {
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((new Date(d + 'T12:00:00') - today) / 86400000);
}

function todayStr() {
  const t = new Date();
  return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
}

function loadGhSettings() {
  gh.token = localStorage.getItem('ct_token') || '';
  gh.owner = localStorage.getItem('ct_owner') || '';
  gh.repo  = localStorage.getItem('ct_repo')  || '';
}

function saveGhSettings(token, owner, repo) {
  gh.token = token; gh.owner = owner; gh.repo = repo;
  localStorage.setItem('ct_token', token);
  localStorage.setItem('ct_owner', owner);
  localStorage.setItem('ct_repo', repo);
}

function isReady() { return gh.token && gh.owner && gh.repo; }

let autoSaveTimer = null;
function markDirty() {
  ui.dirty = true;
  setSync('Unsaved...');
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => saveData(), 2500);
}

const STATUS_LABELS = { not_started: 'Not Started', written: 'Written', posted: 'Posted' };
const STATUSES      = ['not_started', 'written', 'posted'];
const FIELDS        = ['teaser', 'chapter', 'dropNote'];
const FIELD_LABELS  = { teaser: 'Teaser Note', chapter: 'Chapter Post', dropNote: 'Drop Note' };

// ============================================================
// RENDER
// ============================================================
function render() {
  document.getElementById('app').innerHTML = isReady() ? renderApp() : renderSetup();
}

function renderApp() {
  return renderHeader() +
    renderAlerts() +
    renderNav() +
    '<div class="content">' +
      (ui.tab === 'dashboard' ? renderDashboard() : '') +
      (ui.tab === 'calendar'  ? renderCalendar()  : '') +
      (ui.tab === 'books'     ? renderBooks()      : '') +
      (ui.tab === 'settings'  ? renderSettings()   : '') +
    '</div>' +
    (ui.modal ? renderModal() : '');
}

function renderHeader() {
  return `<div class="header">
    <h1>Chapter Tracker</h1>
    <div class="header-right">
      <span class="sync-status" id="sync-status">${esc(ui.syncMsg)}</span>
      <button class="btn-header" onclick="saveData()">Save</button>
    </div>
  </div>`;
}

// ============================================================
// ALERTS (Feature 2: due-soon urgency)
// ============================================================
function renderAlerts() {
  if (ui.alertsDismissed) return '';

  const alerts = [];
  for (const book of state.books) {
    for (const ch of (book.chapters || [])) {
      const days = daysUntil(ch.publishDate);
      if (days === null || days > 7) continue;
      const missing = FIELDS.filter(f => ch[f] !== 'posted')
        .map(f => FIELD_LABELS[f]);
      if (!missing.length) continue;

      let urgency = '';
      if (days < 0)      urgency = Math.abs(days) + 'd overdue';
      else if (days === 0) urgency = 'Publishes TODAY';
      else if (days === 1) urgency = 'Publishes TOMORROW';
      else                 urgency = 'Publishes in ' + days + ' days';

      alerts.push({ book, ch, urgency, missing });
    }
  }

  if (!alerts.length) return '';
  alerts.sort((a,b) => daysUntil(a.ch.publishDate) - daysUntil(b.ch.publishDate));

  return `<div class="alert-banner">
    <div class="alert-banner-top">
      <span class="alert-banner-title">⚠ Needs attention</span>
      <button class="alert-dismiss" onclick="ui.alertsDismissed=true;render()">Dismiss</button>
    </div>
    ${alerts.map(({book, ch, urgency, missing}) => `
      <div class="alert-item" onclick="openChapter('${book.id}','${ch.id}')" style="cursor:pointer">
        <div class="alert-item-left">
          <div class="alert-item-book">${esc(book.title)}</div>
          <div class="alert-item-ch">Ch. ${ch.number}${ch.title ? ': ' + esc(ch.title) : ''}</div>
          <div class="alert-item-date">${esc(urgency)}</div>
          <div class="alert-item-missing">Still needed: ${missing.map(esc).join(', ')}</div>
        </div>
        <span style="color:var(--text-muted);font-size:16px">›</span>
      </div>`).join('')}
  </div>`;
}

function renderNav() {
  const tabs = [
    ['dashboard','Dashboard'],
    ['calendar','Calendar'],
    ['books','Books'],
    ['settings','Settings'],
  ];
  return '<div class="nav-tabs">' +
    tabs.map(([id,label]) =>
      `<button class="nav-tab${ui.tab===id?' active':''}" onclick="setTab('${id}')">${label}</button>`
    ).join('') +
  '</div>';
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const upcoming = [], inProgress = [];

  for (const book of state.books) {
    for (const ch of (book.chapters || [])) {
      const allDone    = FIELDS.every(f => ch[f] === 'posted');
      const anyStarted = FIELDS.some(f => ch[f] !== 'not_started');
      const days       = daysUntil(ch.publishDate);
      if (days !== null && days <= 30 && !allDone) upcoming.push({ book, ch, days });
      else if (anyStarted && !allDone)             inProgress.push({ book, ch });
    }
  }
  upcoming.sort((a,b) => a.days - b.days);

  if (!upcoming.length && !inProgress.length) {
    return `<div class="empty-state">
      <div class="icon">📚</div>
      <p>Nothing yet. Head to <strong>Books</strong> to add your first book and chapters.</p>
    </div>`;
  }

  let html = '';
  if (upcoming.length) {
    html += '<div class="section-label">Upcoming — next 30 days</div>';
    html += upcoming.map(({book, ch, days}) => upcomingCard(book, ch, days)).join('');
  }
  if (inProgress.length) {
    html += `<div class="section-label${upcoming.length?' section-gap':''}">In Progress</div>`;
    html += inProgress.map(({book, ch}) => upcomingCard(book, ch, null)).join('');
  }
  return html;
}

function upcomingCard(book, ch, days) {
  let dateStr = '';
  if (days !== null) {
    if (days === 0)      dateStr = 'Today';
    else if (days < 0)   dateStr = Math.abs(days) + 'd ago';
    else                 dateStr = 'In ' + days + ' day' + (days===1?'':'s');
    if (ch.publishDate) dateStr += ' · ' + fmtDate(ch.publishDate);
  } else if (ch.publishDate) {
    dateStr = fmtDate(ch.publishDate);
  }

  return `<div class="upcoming-card" onclick="openChapter('${book.id}','${ch.id}')">
    <div class="uc-book">${esc(book.title)}</div>
    <div class="uc-title">Ch. ${ch.number}${ch.title ? ': ' + esc(ch.title) : ''}</div>
    ${dateStr ? `<div class="uc-date">${esc(dateStr)}</div>` : ''}
    <div class="uc-chips">
      <span class="chip ${ch.teaser}">Teaser: ${STATUS_LABELS[ch.teaser]}</span>
      <span class="chip ${ch.chapter}">Post: ${STATUS_LABELS[ch.chapter]}</span>
      <span class="chip ${ch.dropNote}">Drop Note: ${STATUS_LABELS[ch.dropNote]}</span>
    </div>
  </div>`;
}

// ============================================================
// CALENDAR (Feature 1)
// ============================================================
function renderCalendar() {
  const year  = ui.calYear;
  const month = ui.calMonth;

  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
  const dayNames   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Build map: 'YYYY-MM-DD' -> [{ book, ch }]
  const eventMap = {};
  for (const book of state.books) {
    for (const ch of (book.chapters || [])) {
      if (!ch.publishDate) continue;
      if (!eventMap[ch.publishDate]) eventMap[ch.publishDate] = [];
      eventMap[ch.publishDate].push({ book, ch });
    }
  }

  // First day of month, last day
  const firstDay  = new Date(year, month, 1);
  const lastDay   = new Date(year, month + 1, 0);
  const startCell = firstDay.getDay(); // 0=Sun
  const today     = todayStr();

  // Build cells
  let cells = '';

  // Day headers
  cells += dayNames.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  // Empty cells before first
  for (let i = 0; i < startCell; i++) {
    const d = new Date(year, month, 1 - (startCell - i));
    cells += calCell(d, year, month, eventMap, today, true);
  }

  // Days in month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    cells += calCell(date, year, month, eventMap, today, false);
  }

  // Fill remaining row
  const total = startCell + lastDay.getDate();
  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remainder; i++) {
    const date = new Date(year, month + 1, i);
    cells += calCell(date, year, month, eventMap, today, true);
  }

  // Legend
  const legend = state.books.map((book, i) => {
    const color = BOOK_COLORS[i % BOOK_COLORS.length];
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      <span>${esc(book.title)}</span>
    </div>`;
  }).join('');

  return `
    <div class="cal-header">
      <button class="cal-nav" onclick="prevMonth()">‹</button>
      <div class="cal-month-title">${monthNames[month]} ${year}</div>
      <button class="cal-nav" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    ${state.books.length ? `<div class="cal-legend" style="margin-top:14px">${legend}</div>` : ''}
  `;
}

function calCell(date, year, month, eventMap, today, otherMonth) {
  const dateStr = date.getFullYear() + '-' +
    String(date.getMonth()+1).padStart(2,'0') + '-' +
    String(date.getDate()).padStart(2,'0');
  const isToday = dateStr === today;
  const events  = eventMap[dateStr] || [];

  const eventsHtml = events.map(({book, ch}) => {
    const color      = bookColor(book.id);
    const colorLight = bookColorLight(book.id);
    const allDone    = FIELDS.every(f => ch[f] === 'posted');
    const label      = 'Ch.' + ch.number + (ch.title ? ' ' + ch.title : '');
    const opacity    = allDone ? '0.55' : '1';
    return `<span class="cal-event"
      style="background:${colorLight};color:${color};border:1px solid ${color}40;opacity:${opacity}"
      onclick="openChapter('${book.id}','${ch.id}')"
      title="${esc(book.title + ' — ' + label)}"
    >${esc(label)}</span>`;
  }).join('');

  return `<div class="cal-cell${otherMonth?' other-month':''}${isToday?' today':''}">
    <div class="cal-date">${date.getDate()}</div>
    ${eventsHtml}
  </div>`;
}

function prevMonth() {
  if (ui.calMonth === 0) { ui.calMonth = 11; ui.calYear--; }
  else ui.calMonth--;
  render();
}
function nextMonth() {
  if (ui.calMonth === 11) { ui.calMonth = 0; ui.calYear++; }
  else ui.calMonth++;
  render();
}

    return `<div class="overlay" onclick="overlayClose(event)"><div class="modal">
      <div class="modal-title">${type === 'add-book' ? 'Add Book' : 'Edit Book'}</div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="m-title" value="${book ? esc(book.title) : ''}" placeholder="Book title">
      </div>
      <div class="form-group">
        <label class="form-label">Author</label>
        <input class="form-input" id="m-author" value="${book ? esc(book.author||'') : ''}" placeholder="Author name">

      <div class="btn-row">
        <button class="btn btn-primary" onclick="${type==='add-book' ? 'doAddBook()' : `doSaveBook('${data.bookId}')`}">${type==='add-book' ? 'Add Book' : 'Save'}</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        ${type==='edit-book' ? `<button class="btn btn-danger btn-sm ml-auto" onclick="doDeleteBook('${data.bookId}')">Delete</button>` : ''}
      </div>
    </div></div>`;
  }

  // --- Add Chapter ---
  if (type === 'add-chapter') {
    return `<div class="overlay" onclick="overlayClose(event)"><div class="modal">
      <div class="modal-title">Add Chapter</div>
      <div class="form-group">
        <label class="form-label">Chapter Number</label>
        <input class="form-input" id="m-num" type="number" value="${getNextNum(data.bookId)}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Chapter Title <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input class="form-input" id="m-title" placeholder="e.g. The First Storm">
      </div>
      <div class="form-group">
        <label class="form-label">Target Publish Date</label>
        <input class="form-input" id="m-date" type="date">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doAddChapter('${data.bookId}')">Add Chapter</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // --- Edit Chapter ---
  if (type === 'edit-chapter') {
    const book = state.books.find(b => b.id === data.bookId);
    const ch   = book?.chapters?.find(c => c.id === data.chapterId);
    if (!ch) return '';

    const contentBlocks = FIELDS.map(field => {
      const bodyId     = `cb-body-${field}`;
      const contentKey = field + 'Content';
      const statusBtns = STATUSES.map(s =>
        `<button class="sbtn${ch[field]===s?' active-'+s:''}" onclick="setStatus('${data.bookId}','${data.chapterId}','${field}','${s}')">${STATUS_LABELS[s]}</button>`
      ).join('');
      return `<div class="content-block">
        <div class="content-block-header" onclick="toggleBlock('${bodyId}')">
          <span class="content-block-label">${FIELD_LABELS[field]}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="chip ${ch[field]}" style="pointer-events:none">${STATUS_LABELS[ch[field]]}</span>
            <span class="chevron" id="chv-${bodyId}">▼</span>
          </div>
        </div>
        <div class="content-block-body" id="${bodyId}" style="display:none">
          <div class="status-row">
            <div class="status-label">Status</div>
            <div class="status-btns">${statusBtns}</div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Draft / Content <span style="font-weight:400;text-transform:none;letter-spacing:0">— paste links, text, anything to copy into Substack</span></label>
            <textarea class="form-input" id="m-content-${field}" style="min-height:90px" placeholder="Paste links, draft text, notes to copy into Substack...">${esc(ch[contentKey]||'')}</textarea>
          </div>
        </div>

    }).join('');

    return `<div class="overlay" onclick="overlayClose(event)"><div class="modal">
      <div class="modal-title">Chapter ${ch.number}${ch.title ? ': ' + esc(ch.title) : ''}</div>
      <div class="form-group">
        <label class="form-label">Chapter Number</label>
        <input class="form-input" id="m-num" type="number" value="${ch.number}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Chapter Title</label>
        <input class="form-input" id="m-title" value="${esc(ch.title||'')}">
      </div>
      <div class="form-group">
        <label class="form-label">Target Publish Date</label>

      </div>

        <label class="form-label">Substack URL <span style="font-weight:400;text-transform:none;letter-spacing:0">(once live)</span></label>
        <input class="form-input" id="m-url" type="url" value="${esc(ch.substackUrl||'')}" placeholder="https://...">
      </div>
      <div class="status-section">
        <div class="status-section-title">Content &amp; Status</div>
        ${contentBlocks}
      </div>
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="m-notes" placeholder="Any notes for this chapter...">${esc(ch.notes||'')}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doSaveChapter('${data.bookId}','${data.chapterId}')">Save</button>

        <button class="btn btn-danger btn-sm ml-auto" onclick="doDeleteChapter('${data.bookId}','${data.chapterId}')">Delete</button>
      </div>
    </div></div>`;
  }

  // --- Book Index (Feature 4) ---
  if (type === 'book-index') {
    const book = state.books.find(b => b.id === data.bookId);
    if (!book) return '';
    const chs  = (book.chapters || []).slice().sort((a,b) => a.number - b.number);

    const indexText = buildIndexText(book, chs);

    const rows = chs.map(ch => {
      const allDone = FIELDS.every(f => ch[f] === 'posted');
      return `<div class="chapter-item" onclick="openChapter('${book.id}','${ch.id}')">
        <div class="ch-num">Ch.${ch.number}</div>
        <div class="ch-info">
          <div class="ch-name">${esc(ch.title || '(Untitled)')}</div>
          ${ch.publishDate ? `<div class="ch-date">${fmtDate(ch.publishDate)}</div>` : ''}
          ${ch.substackUrl ? `<div style="font-size:11px;color:var(--accent);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ch.substackUrl)}</div>` : ''}
        </div>
        <div class="ch-dots">
          <div class="dot ${ch.teaser}"></div>
          <div class="dot ${ch.chapter}"></div>
          <div class="dot ${ch.dropNote}"></div>
        </div>
      </div>`;
    }).join('');

    return `<div class="overlay" onclick="overlayClose(event)"><div class="modal">
      <div class="modal-title">${esc(book.title)}</div>
      ${book.author ? `<div style="color:var(--text-muted);font-size:13px;margin-top:-10px;margin-bottom:14px">by ${esc(book.author)}</div>` : ''}

      ${chs.length ? `
        <div style="max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:0 12px;margin-bottom:14px">
          ${rows}
        </div>
      ` : `<p style="color:var(--text-muted);margin-bottom:14px">No chapters yet.</p>`}

      ${chs.length ? `
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Copyable Index Text</div>
        <div class="index-text" id="index-text-box">${esc(indexText)}</div>
        <div class="copy-row">
          <button class="btn btn-primary btn-sm" onclick="copyIndex()">Copy to Clipboard</button>
          <span class="copy-msg hidden" id="copy-msg">Copied!</span>
        </div>
      ` : ''}

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      </div>
    </div></div>`;
  }

  return '';
}

function buildIndexText(book, chs) {
  let text = book.title.toUpperCase() + '\n';
  if (book.author) text += 'by ' + book.author + '\n';
  text += '\n';
  for (const ch of chs) {
    const title = ch.title ? `Chapter ${ch.number}: ${ch.title}` : `Chapter ${ch.number}`;
    text += title + '\n';
    if (ch.substackUrl) text += ch.substackUrl + '\n';
    else if (ch.publishDate) text += '(Coming ' + fmtDateShort(ch.publishDate) + ')\n';
    else text += '(Coming soon)\n';
    text += '\n';
  }
  return text.trimEnd();
}

async function copyIndex() {
  const el = document.getElementById('index-text-box');
  if (!el) return;
  try {
    await navigator.clipboard.writeText(el.textContent);
    const msg = document.getElementById('copy-msg');
    if (msg) {
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 2000);
    }
  } catch(e) {
    // Fallback: select the text
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  }
}

// ============================================================
// ACTIONS
// ============================================================
function setTab(t) { ui.tab = t; render(); }

function toggleBook(id) {
  ui.expanded.has(id) ? ui.expanded.delete(id) : ui.expanded.add(id);
  render();
}

function openModal(type, data) { ui.modal = { type, data }; render(); }
function closeModal() { ui.modal = null; render(); }
function overlayClose(e) { if (e.target === e.currentTarget) closeModal(); }
function openChapter(bookId, chapterId) { openModal('edit-chapter', { bookId, chapterId }); }

function toggleBlock(bodyId) {
  const el  = document.getElementById(bodyId);
  const chv = document.getElementById('chv-' + bodyId);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (chv) chv.classList.toggle('open', !open);
}

function getNextNum(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book?.chapters?.length) return 1;
  return Math.max(...book.chapters.map(c => c.number)) + 1;
}

function doAddBook() {
  const title  = document.getElementById('m-title').value.trim();
  const author = document.getElementById('m-author').value.trim();
  if (!title) return;
  state.books.push({ id: uid(), title, author, chapters: [] });
  markDirty(); closeModal();
}

function doSaveBook(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  const title = document.getElementById('m-title').value.trim();
  if (title) book.title = title;
  book.author = document.getElementById('m-author').value.trim();
  markDirty(); closeModal();
}

function doDeleteBook(bookId) {
  if (!confirm('Delete this book and all its chapters?')) return;
  state.books = state.books.filter(b => b.id !== bookId);
  markDirty(); closeModal();
}

function doAddChapter(bookId) {
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  book.chapters.push({
    id: uid(),
    number:          parseInt(document.getElementById('m-num').value) || 1,
    title:           document.getElementById('m-title').value.trim(),
    publishDate:     document.getElementById('m-date').value,
    substackUrl:     '',
    teaser:          'not_started',
    chapter:         'not_started',
    dropNote:        'not_started',
    teaserContent:   '',
    chapterContent:  '',
    dropNoteContent: '',
    notes:           '',
  });
  book.chapters.sort((a,b) => a.number - b.number);
  markDirty(); closeModal();
}

function doSaveChapter(bookId, chapterId) {
  const book = state.books.find(b => b.id === bookId);
  const ch   = book?.chapters?.find(c => c.id === chapterId);
  if (!ch) return;
  ch.number      = parseInt(document.getElementById('m-num').value) || ch.number;
  ch.title       = document.getElementById('m-title').value.trim();
  ch.publishDate = document.getElementById('m-date').value;
  ch.substackUrl = document.getElementById('m-url').value.trim();
  ch.notes       = document.getElementById('m-notes').value;
  const tc = document.getElementById('m-content-teaser');
  const cc = document.getElementById('m-content-chapter');
  const dc = document.getElementById('m-content-dropNote');
  if (tc) ch.teaserContent   = tc.value;
  if (cc) ch.chapterContent  = cc.value;
  if (dc) ch.dropNoteContent = dc.value;
  book.chapters.sort((a,b) => a.number - b.number);
  markDirty(); closeModal();
}

function doDeleteChapter(bookId, chapterId) {
  if (!confirm('Delete this chapter?')) return;
  const book = state.books.find(b => b.id === bookId);
  if (!book) return;
  book.chapters = book.chapters.filter(c => c.id !== chapterId);
  markDirty(); closeModal();
}

function setStatus(bookId, chapterId, field, value) {
  const book = state.books.find(b => b.id === bookId);
  const ch   = book?.chapters?.find(c => c.id === chapterId);
  if (!ch) return;
  ch[field] = value;
  markDirty(); render();
}

function submitSetup() {
  const owner = document.getElementById('su-owner').value.trim();
  const repo  = document.getElementById('su-repo').value.trim();
  const token = document.getElementById('su-token').value.trim();
  if (!owner || !repo || !token) { alert('Please fill in all three fields.'); return; }
  saveGhSettings(token, owner, repo);
  loadData();
}

function applySettings() {
  const owner = document.getElementById('s-owner').value.trim();
  const repo  = document.getElementById('s-repo').value.trim();
  const token = document.getElementById('s-token').value.trim();
  saveGhSettings(token, owner, repo);
  gh.sha = null;
  loadData();
}

// ============================================================
// INIT
// ============================================================
loadGhSettings();
render();
if (isReady()) loadData();
</script>
</body>
</html>
